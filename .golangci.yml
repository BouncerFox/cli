run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - gocritic
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - noctx
    - exhaustive
    - unconvert
    - misspell
    - gofmt

linters-settings:
  gosec:
    excludes: []
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam
  exhaustive:
    default-signifies-exhaustive: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
