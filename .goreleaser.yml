version: 2
project_name: bouncerfox

builds:
  - id: bouncerfox
    main: ./cmd/bouncerfox
    binary: bouncerfox
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
  - id: bf
    main: ./cmd/bouncerfox
    binary: bf
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    builds: [bouncerfox, bf]
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - name: bouncerfox
    repository:
      owner: bouncerfox
      name: homebrew-tap
    homepage: "https://github.com/bouncerfox/cli"
    description: "Scan AI agent config files for security and quality issues"
    license: "Apache-2.0"
    install: |
      bin.install "bouncerfox"
      bin.install "bf"
    test: |
      system "#{bin}/bf", "--version"
