name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'

      - name: Run Phase 1 contract tests
        run: go test ./pkg/platform ./pkg/config ./pkg/upload -run 'Phase1|ExtractSkillMetadata' -v

      - name: Run tests
        run: go test ./... -race

      - name: Run vet
        run: go vet ./...

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Build smoke test
        run: go build -ldflags="-X main.version=ci-$(git rev-parse --short HEAD)" -o bouncerfox ./cmd/bouncerfox

  windows-test:
    name: Windows compatibility
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build and smoke test
        run: |
          go build -ldflags="-X main.version=ci-windows" -o bouncerfox.exe ./cmd/bouncerfox
          $versionOutput = .\bouncerfox.exe version
          if ($versionOutput -notmatch "ci-windows") {
            throw "built CLI did not report the injected version: $versionOutput"
          }

  scan:
    name: BouncerFox Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run BouncerFox
        uses: ./
