name: 'BouncerFox Scan'
author: 'BouncerFox'
description: 'Find security risks, secrets, and quality issues in your AI agent config files before they ship'
branding:
  icon: 'shield'
  color: 'orange'
inputs:
  path:
    description: 'Path to scan'
    default: '.'
  api-key:
    description: 'BouncerFox platform API key (enables connected mode)'
    default: ''
  format:
    description: 'Output format (table, json, sarif)'
    default: 'table'
  severity:
    description: 'Minimum severity to display (standalone mode: also controls exit code)'
    default: 'info'
  github-comment:
    description: 'Post findings as PR comment with inline annotations'
    default: 'true'
  ignore:
    description: 'Comma-separated gitignore-style globs to skip (e.g. "**/testdata/**,demo/**")'
    default: ''
  config:
    description: 'Config file path (standalone mode only)'
    default: ''
runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    BOUNCERFOX_API_KEY: ${{ inputs.api-key }}
