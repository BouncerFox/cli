version: 2
project_name: bouncerfox

builds:
  - id: bf
    main: ./cmd/bouncerfox
    binary: bf
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    ids: [bf]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: bouncerfox
    binaries:
      - bf
    homepage: "https://github.com/bouncerfox/cli"
    description: "Scan AI agent config files for security and quality issues"
    repository:
      owner: bouncerfox
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
