name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./... -race

      - name: Run vet
        run: go vet ./...

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Build smoke test
        run: go build -ldflags="-X main.version=ci-$(git rev-parse --short HEAD)" -o bouncerfox ./cmd/bouncerfox

  scan:
    name: BouncerFox Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run BouncerFox
        uses: ./
        with:
          ignore: '**/testdata/**,demo/**'
